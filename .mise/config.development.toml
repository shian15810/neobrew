#:schema https://mise.jdx.dev/schema/mise.json
#:tombi toml-version = "v1.1.0"

# Dev Tools

[tools]
rust = [
    {
        version = "stable",
        components = "rustfmt,clippy,rust-src",
        profile = "minimal",
        targets = "aarch64-apple-darwin,aarch64-unknown-linux-gnu,x86_64-apple-darwin,x86_64-unknown-linux-gnu",
    },
    {
        version = "nightly",
        components = "rustfmt,clippy,miri,rust-src",
        profile = "minimal",
        targets = "aarch64-apple-darwin,aarch64-unknown-linux-gnu,x86_64-apple-darwin,x86_64-unknown-linux-gnu",
    },
]

# Environment Variables

[env]
_.source = { path = ".mise/config.development.env.bash", tools = true }
RUSTFLAGS = { required = true, tools = true }
RUSTDOCFLAGS = { required = true, tools = true }
CLIPPYFLAGS = { required = true, tools = true }

# Homebrew Tasks

[tasks."brew:bundle"]
run = "brew bundle check || brew bundle install"
alias = "preinstall:homebrew"

# Cargo Build Tasks

[tasks."cargo:miri:setup"]
tools = { rust = "nightly" }
run = "cargo +nightly miri setup"
alias = "postinstall:miri"

[tasks."cargo:run"]
tools = { rust = "nightly" }
run = "cargo +nightly run --all-features"
raw_args = true

[tasks."cargo:miri:run"]
tools = { rust = "nightly" }
run = "cargo +nightly miri run --all-features"

[tasks."cargo:fmt"]
tools = { rust = "nightly" }
run = "cargo +nightly fmt -- --files-with-diff"
alias = "format:rustfmt"

[tasks."cargo:fmt:check"]
tools = { rust = "nightly" }
run = "cargo +nightly fmt -- --check"
alias = "lint:rustfmt"

[tasks."cargo:check"]
tools = { rust = "nightly" }
run = "cargo +nightly check --all-targets --all-features"

[tasks."cargo:fix"]
tools = { rust = "nightly" }
run = "cargo +nightly fix --broken-code --edition-idioms --allow-dirty --all-targets --all-features"

[tasks."cargo:fix:diff"]
tools = { rust = "nightly" }
run = """\
    cargo +nightly fix --broken-code --edition-idioms --allow-dirty --all-targets --all-features \
        && git diff --exit-code\
"""

[tasks."cargo:clippy"]
tools = { rust = "nightly" }
run = "cargo +nightly clippy --all-targets --all-features -- {{ env.CLIPPYFLAGS }}"
alias = "lint:clippy"

[tasks."cargo:clippy:fix"]
tools = { rust = "nightly" }
run = "cargo +nightly clippy --fix --broken-code --edition-idioms --allow-dirty --all-targets --all-features -- {{ env.CLIPPYFLAGS }}"
alias = "fix:clippy"

[tasks."cargo:clippy:fix:diff"]
tools = { rust = "nightly" }
run = """\
    cargo +nightly clippy --fix --broken-code --edition-idioms --allow-dirty --all-targets --all-features -- {{ env.CLIPPYFLAGS }} \
        && git diff --exit-code\
"""
alias = "postlint:clippy"

[tasks."cargo:test"]
tools = { rust = "nightly" }
run = "cargo +nightly test --all-features"

[tasks."cargo:miri:test"]
tools = { rust = "nightly" }
run = "cargo +nightly miri test --all-features"

[tasks."cargo:test:doc"]
tools = { rust = "nightly" }
run = "cargo +nightly test --doc --all-features"
alias = "test:doctest"

[tasks."cargo:miri:test:doc"]
tools = { rust = "nightly" }
run = "cargo +nightly miri test --doc --all-features || true"
alias = "posttest:doctest"

[tasks."cargo:doc"]
tools = { rust = "nightly" }
run = "cargo +nightly doc --no-deps --document-private-items --all-features"
alias = "build:rustdoc"

[tasks."cargo:build"]
tools = { rust = "nightly" }
run = "cargo +nightly build --all-targets --all-features"
alias = "build:rustc:debug"

[tasks."cargo:build:release"]
tools = { rust = "stable" }
run = "cargo +stable build --release --all-targets --all-features"
alias = "build:rustc:release"

[tasks."cargo:bench"]
tools = { rust = "stable" }
run = "cargo +stable bench --all-features"
alias = "bench:test"

# Cargo Nextest Tasks

[tasks."cargo:nextest:run"]
tools = { rust = "nightly" }
run = "cargo +nightly nextest run --no-pager --no-tests=\"pass\" --all-features"
alias = "test:nextest"

[tasks."cargo:miri:nextest:run"]
tools = { rust = "nightly" }
run = "cargo +nightly miri nextest run --no-pager --no-tests=\"pass\" --all-features || true"
alias = "posttest:nextest"

[tasks."cargo:nextest:bench"]
tools = { rust = "stable" }
env = { NEXTEST_EXPERIMENTAL_BENCHMARKS = 1 }
run = "cargo +stable nextest bench --no-pager --no-tests=\"pass\" --all-features"

# Taplo Tasks

[tasks."taplo:fmt"]
env = { RUST_LOG = "error" }
run = "taplo fmt"
alias = "format:taplo"

[tasks."taplo:fmt:check"]
env = { RUST_LOG = "error" }
run = "taplo fmt --diff --check || true"
alias = "lint:taplo:fmt"

[tasks."taplo:check"]
env = { RUST_LOG = "error" }
run = "taplo check --default-schema-catalogs || true"
alias = "lint:taplo:check"

# Tombi Tasks

[tasks."tombi:format"]
run = "tombi format"
alias = "format:tombi"

[tasks."tombi:format:check"]
run = "tombi format --diff --check"
alias = "lint:tombi:format"

[tasks."tombi:lint"]
run = "tombi lint"
alias = "lint:tombi:lint"

# markdownlint Tasks

[tasks.markdownlint]
run = "markdownlint-cli2 \"**/*.md\" \"#.git\" \"#.vscode/mise-tools\" \"#target\""
alias = "lint:markdownlint"

[tasks."markdownlint:fix"]
run = "markdownlint-cli2 \"**/*.md\" \"#.git\" \"#.vscode/mise-tools\" \"#target\" --fix"
alias = "fix:markdownlint"

# Prettier Tasks

[tasks.prettier]
run = "prettier \"**/*.{md,yaml,yml}\" --no-error-on-unmatched-pattern --check"
alias = "lint:prettier"

[tasks."prettier:write"]
run = "prettier \"**/*.{md,yaml,yml}\" --no-error-on-unmatched-pattern --check --write"
alias = "format:prettier"

# Biome Tasks

[tasks."biome:format"]
run = "biome format --no-errors-on-unmatched"
alias = "lint:biome:format"

[tasks."biome:format:write"]
run = "biome format --no-errors-on-unmatched --write"
alias = "format:biome"

[tasks."biome:lint"]
run = "biome lint --no-errors-on-unmatched"
alias = "lint:biome:lint"

[tasks."biome:lint:write"]
run = "biome lint --no-errors-on-unmatched --write --unsafe"

[tasks."biome:lint:write:safe"]
run = "biome lint --no-errors-on-unmatched --write"
alias = "fix:biome"

[tasks."biome:lint:write:unsafe"]
run = "biome lint --no-errors-on-unmatched --unsafe"

# shfmt Tasks

[tasks.shfmt]
run = "shfmt --list --diff \".\""
alias = "lint:shfmt"

[tasks."shfmt:write"]
run = "shfmt --list --write \".\""
alias = "format:shfmt"

# ShellCheck Tasks

[tasks.shellcheck]
run = "shfmt --find=0 \".\" | xargs -r -0 shellcheck --check-sourced"
alias = "lint:shellcheck"

[tasks."shellcheck:patch"]
run = "shfmt --find=0 \".\" | xargs -r -0 shellcheck --check-sourced --format=\"diff\" | patch -u -p1"
alias = "fix:shellcheck"

# CSpell Tasks

[tasks.cspell]
run = "cspell \".\" --no-must-find-files --no-progress --show-suggestions --show-context"
alias = "lint:cspell:lint"

[tasks."cspell:dictionaries"]
run = "/bin/sh -eu \".mise/scripts/tasks-cspell-dictionaries.sh\""
alias = "lint:cspell:dictionaries"
