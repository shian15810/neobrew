#:schema https://mise.jdx.dev/schema/mise.json
#:tombi toml-version = "v1.1.0"

# Settings

[settings]
use_versions_host_track = false
disable_hints = ["*"]
experimental = true
auto_install = false
color_theme = "catppuccin"
unix_default_file_shell_args = "/bin/sh -eu --"
unix_default_inline_shell_args = "/bin/sh -c -eu --"
task.show_full_cmd = true
task.output = "keep-order"

# Environment Variables

[env]
_.source = { path = ".mise/config.env.bash", tools = true }
HOMEBREW_NO_ANALYTICS = 1
HOMEBREW_NO_ENV_HINTS = 1
HOMEBREW_BUNDLE_BREW_SKIP = "{{ get_env(name='HOMEBREW_BUNDLE_BREW_SKIP', default='') }}"
RUST_BACKTRACE = 1
RUSTC_WRAPPER = "sccache"
CMAKE_C_COMPILER_LAUNCHER = "sccache"
CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
CMAKE_OBJC_COMPILER_LAUNCHER = "sccache"
CMAKE_OBJCXX_COMPILER_LAUNCHER = "sccache"
CC = "sccache cc"
CXX = "sccache c++"
OBJC = "sccache cc"
OBJCXX = "sccache c++"
CARGO_BUILD_TARGET = "{{ get_env(name='CARGO_BUILD_TARGET', default='host-tuple') }}"

# Hooks

[hooks]
preinstall = { task = "preinstall:**" }
postinstall = { task = "postinstall:**" }

# Default Task

[tasks.default]
env = { MISE_TASK_OUTPUT = "interleave" }
run = "mise run cargo:run"
raw_args = true
interactive = true

# Grouped Tasks

[tasks.format]
depends = ["format:**"]

[tasks.lint]
usage = "flag \"--run-post\" default=#false"
depends = ["lint:**"]
depends_post = ["{% if usage.run_post %}postlint:**{% else %}noop{% endif %}"]

[tasks.fix]
depends = ["fix:**"]

[tasks.test]
usage = "flag \"--run-post\" default=#false"
depends = ["test:**"]
depends_post = ["{% if usage.run_post %}posttest:**{% else %}noop{% endif %}"]

[tasks.build]
depends = ["build:**"]

[tasks.bench]
depends = ["bench:**"]

# Noop Task

[tasks.noop]
depends = []
