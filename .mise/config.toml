#:schema https://mise.jdx.dev/schema/mise.json

[settings]
disable_hints = ["*"]
task.output = "keep-order"

[tasks.setup]
run = "brew bundle check || brew bundle install"

# Cargo Tasks

[tasks.run]
run = "cargo +nightly run"
alias = "default"

[tasks.fmt]
run = "cargo +nightly fmt"
alias = "format:rustfmt"

[tasks.check]
run = "cargo +nightly check"

[tasks.clippy]
run = "cargo +nightly clippy"
alias = "lint:clippy"

[tasks.test]
run = "cargo +nightly test"

[tasks.nextest]
run = "cargo +nightly nextest run --no-tests=pass"
depends_post = ["doctest"]

[tasks.doctest]
run = "cargo +nightly test --doc"

[tasks.doc]
run = "cargo +nightly doc --no-deps"

[tasks.build]
run = "cargo build --release"

[tasks.bench]
run = "cargo bench"

# Other Tasks

[tasks.format]
depends = ["format:*"]

[tasks.lint]
depends = ["lint:*"]

[tasks."format:taplo"]
run = "RUST_LOG=error taplo format"

[tasks."lint:taplo:format"]
run = "RUST_LOG=error taplo format --check"

[tasks."lint:taplo:lint"]
run = "RUST_LOG=error taplo lint --default-schema-catalogs"

[tasks."lint:markdownlint"]
run = "markdownlint-cli2 \"**/*.md\" \"#.git\" \"#.vscode/mise-tools\" \"#target\""

[tasks."format:prettier"]
run = "prettier \"**/*.{md,yaml,yml}\" --write --list-different"

[tasks."lint:prettier"]
run = "prettier \"**/*.{md,yaml,yml}\" --check"

[tasks."format:biome"]
run = "biome format --write"

[tasks."lint:biome"]
run = "biome check"

[tasks."format:shfmt"]
run = "shfmt --list --write ."

[tasks."lint:shfmt"]
run = "shfmt --list ."

[tasks."lint:shellcheck"]
run = "shfmt --find=0 . | xargs -0 shellcheck"
