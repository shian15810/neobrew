#:schema https://mise.jdx.dev/schema/mise.json

# Settings

[settings]
experimental = true
auto_install = false
disable_hints = ["*"]
unix_default_file_shell_args = "/bin/sh -eu --"
unix_default_inline_shell_args = "/bin/sh -c -eu --"
task.output = "keep-order"
task.show_full_cmd = true

# Environment Variables

[env]
HOMEBREW_NO_ANALYTICS = 1
HOMEBREW_NO_ENV_HINTS = 1
HOMEBREW_BUNDLE_BREW_SKIP = "{{ get_env(name='HOMEBREW_BUNDLE_BREW_SKIP', default='') }}"
RUST_BACKTRACE = 1
RUSTC_WRAPPER = "sccache"
CMAKE_C_COMPILER_LAUNCHER = "sccache"
CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
CMAKE_OBJC_COMPILER_LAUNCHER = "sccache"
CMAKE_OBJCXX_COMPILER_LAUNCHER = "sccache"
CC = "sccache cc"
CXX = "sccache c++"
OBJC = "sccache cc"
OBJCXX = "sccache c++"

# Hooks

[hooks]
preinstall = { task = "setup" }

# Setup Task

[tasks.setup]
run = "brew bundle check || brew bundle install"
