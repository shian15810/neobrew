#:tombi toml-version = "v1.0.0"

allow-comparison-to-zero = false
allow-exact-repetitions = false
allow-expect-in-consts = false
allow-large-stack-frames-in-tests = false
allow-mixed-uninlined-format-args = false
allow-unwrap-in-consts = false
avoid-breaking-exported-api = false
upper-case-acronyms-aggressive = true

absolute-paths-allowed-crates = ["build_rs", "infer", "proc_exit"]
allowed-idents-below-min-chars = ["e", ".."]
disallowed-macros = [
    "core::panic",
    "core::todo",
    "core::unimplemented",
    "core::unreachable",
]
disallowed-methods = [
    "core::hint::assert_unchecked",
    "core::hint::unreachable_unchecked",
    "std::panic::panic_any",
    "std::panic::resume_unwind",
    "std::process::abort",
    "std::process::exit",
]
disallowed-names = [
    "anyhow::Result::Err",
    "anyhow::Result::Ok",
    "core::option::Option::None",
    "core::option::Option::Some",
    "core::result::Result::Err",
    "core::result::Result::Ok",
    "either::Either::Left",
    "either::Either::Right",
]
