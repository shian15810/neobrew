# $schema: https://www.schemastore.org/github-workflow.json

name: Rust Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: /bin/sh -eu -- "{0}"

env:
  LC_ALL: C

jobs:
  lint:
    uses: ./.github/workflows/reusable.yml
    with:
      toolchain: nightly
      task: lint

  test:
    uses: ./.github/workflows/reusable.yml
    with:
      toolchain: nightly
      task: test

  build:
    uses: ./.github/workflows/reusable.yml
    with:
      toolchain: stable
      task: build
